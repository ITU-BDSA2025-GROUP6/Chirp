# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: CD #Build and deploy ASP.Net Core app to Azure Web App - bdsa2025group6chirp

on:
  push:
    branches:
      - main
  workflow_dispatch:
      
permissions: 
  contents: read
  packages: write
  
jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      # Image 1: itu-minitwit
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-minitwit:latest
            ${{ secrets.DOCKER_USERNAME }}/itu-minitwit:${{ github.sha }}
            
  deploy-preprod:
    runs-on: ubuntu-latest
    needs: build-push
    environment: preprod
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.PREPROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key
          
      - name: Sync files to pre-prod droplet
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'bin' \
            --exclude 'obj' \
            --exclude 'data' \
            --exclude '.env' \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.PREPROD_SSH_USER }}@${{ secrets.PREPROD_SSH_HOST }}:/opt/itu-minitwit/
    

      - name: Write preprod .env on droplet
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PREPROD_SSH_HOST }}
          username: ${{ secrets.PREPROD_SSH_USER }}
          key: ${{ secrets.PREPROD_SSH_KEY }}
          script: |
            mkdir -p /opt/itu-minitwit
            cat > /opt/itu-minitwit/.env <<'EOF'
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            TAG=${{ github.sha }}
            ASPNETCORE_ENVIRONMENT=Production
            ASPNETCORE_URLS=http://+:5001
            ConnectionStrings__DefaultConnection=${{ secrets.PREPROD_DO_CONNECTION_STRING }}
            EOF
            
      - name: Run deploy script on pre-prod
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PREPROD_SSH_HOST }}
          username: ${{ secrets.PREPROD_SSH_USER }}
          key: ${{ secrets.PREPROD_SSH_KEY }}
          script: |
            cd /opt/itu-minitwit
            chmod +x scripts/deploy.sh
            TAG=${{ github.sha }} DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} bash scripts/deploy.sh
            
  # ── Smoke-test pre-prod ──
  smoke-test-preprod:
    runs-on: ubuntu-latest
    needs: deploy-preprod
    steps:
      - name: Wait for app startup
        run: sleep 15

      - name: Health check pre-prod
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ secrets.PREPROD_SSH_HOST }}:5001/" || true)
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "Pre-prod is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "Pre-prod health check failed after 5 attempts"
          exit 1
  
  deploy-production:
    runs-on: ubuntu-latest
    needs: smoke-test-preprod
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.PREPROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key
          
      - name: Sync files to droplet
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'bin' \
            --exclude 'obj' \
            --exclude 'data' \
            --exclude '.env' \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/itu-minitwit/

      - name: Write production .env on droplet
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /opt/itu-minitwit
            cat > /opt/itu-minitwit/.env <<'EOF'
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            TAG=${{ github.sha }}
            ASPNETCORE_ENVIRONMENT=Production
            ASPNETCORE_URLS=http://+:5001
            ConnectionStrings__DefaultConnection=${{ secrets.DO_CONNECTION_STRING }}
            EOF

      - name: Run deploy script on production
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/itu-minitwit
            chmod +x scripts/deploy.sh
            TAG=${{ github.sha }} DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} bash scripts/deploy.sh

