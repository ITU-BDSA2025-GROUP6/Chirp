name: Release Chirp Executable
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x
      - name: Test
        run: dotnet test -c Release

  prep-publish:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    runs-on: ubuntu-latest
    needs: prep-publish
    strategy:
      matrix:
        rid: [ win-x64, linux-x64, osx-x64, osx-arm64 ]
    steps:
      - uses: actions/checkout@v5
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x
      - name: Publish Executable
        run: |
          release_name="Chirp-${{ github.ref_name }}-${{ matrix.rid }}"
          dotnet publish src/Chirp.CLI/Chirp.CLI.csproj -r "${{ matrix.rid }}" -o "${release_name}" --sc false -p:PublishSingleFile=True
          7z a "${release_name}.zip" "${release_name}/."
          7z d "${release_name}.zip" "*.pdb"
          rm -r "${release_name}"
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: Chirp-*.zip
          generate_release_notes: true