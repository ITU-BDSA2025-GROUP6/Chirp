apiVersion: 1

# Inspired by https://community.grafana.com/t/solved-datasource-provisioning-prometheus/6300
datasources:
  - name: prometheus
    type: prometheus
    uid: prometheus-ds
    url: http://prometheus:9090
    isDefault: true
    editable: false
    
  - name: loki
    type: loki
    uid: loki-ds
    url: http://loki:3100
    isDefault: false
    editable: false